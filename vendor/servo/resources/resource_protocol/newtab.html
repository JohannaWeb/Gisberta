<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gisberta - New Tab</title>
    <link rel="stylesheet" href="resource:///newtab.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Pastel Pink Browser</p>
        <h1>Gisberta</h1>
        <p class="lede">
          A soft, bright browser shell built with Rust and Servo.
        </p>
        <p class="tribute">
          The name honors Gisberta Salce Junior, a trans woman murdered in 2006.
        </p>
        <p class="solidarity">
          Made with care for trans users, including the woman this browser is being built for now.
        </p>
      </section>

      <form action="https://duckduckgo.com/html/" class="search">
        <input name="q" placeholder="Search the web…" autofocus />
        <button type="submit">Go</button>
      </form>

      <nav class="links">
        <a href="https://servo.org">Servo</a>
        <a href="servo:preferences">Preferences</a>
        <a href="servo:config">Config</a>
      </nav>
    </main>
  </body>
</html>
